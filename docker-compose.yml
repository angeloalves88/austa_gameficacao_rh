services:
  score-saude:
    build: .
    container_name: score-saude-rh
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.score-saude-rh.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.score-saude-rh.entrypoints=web"
      - "traefik.http.routers.score-saude-rh.service=score-saude-rh"
      - "traefik.http.routers.score-saude-rh-secure.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.score-saude-rh-secure.entrypoints=websecure"
      - "traefik.http.routers.score-saude-rh-secure.service=score-saude-rh"
      - "traefik.http.routers.score-saude-rh-secure.tls=true"
      - "traefik.http.services.score-saude-rh.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
